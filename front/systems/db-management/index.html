<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据库管理 - 系统门户管理平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
    <div class="sidebar">
        <div class="sidebar-header"><div class="logo"><i class="fas fa-database"></i></div><h2>数据库管理系统</h2></div>
        <nav class="sidebar-nav">
            <div class="nav-group-title">数据库管理</div>
            <a class="nav-item" href="index.html"><i class="fas fa-server"></i> 实例管理</a>
            <a class="nav-item" href="tables.html"><i class="fas fa-table"></i> 表管理</a>
            <a class="nav-item" href="sql-query.html"><i class="fas fa-terminal"></i> SQL查询</a>
        </nav>
        <div class="sidebar-footer"><a href="../../index.html"><i class="fas fa-arrow-left"></i> 返回门户首页</a></div>
    </div>
    <div class="main-content">
        <div class="main-header">
            <h2>实例管理</h2>
            <div class="user-dropdown"><div class="user-dropdown-trigger"><div style="width:32px;height:32px;border-radius:50%;background:#8B5CF6;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;"><i class="fas fa-user"></i></div><span class="user-name" style="font-size:14px;"></span></div>
                <div class="user-dropdown-menu"><a href="../../profile.html"><i class="fas fa-id-card"></i> 个人信息</a><a href="javascript:void(0)" onclick="showChangePwdModal()"><i class="fas fa-key"></i> 修改密码</a><div class="divider"></div><a href="javascript:void(0)" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> 退出登录</a></div>
            </div>
        </div>
        <div class="main-body">
            <div class="stats-row">
                <div class="stat-card"><div class="stat-icon" style="background:#4A90D9;"><i class="fas fa-database"></i></div><div class="stat-info"><h3 id="stat-instances">0</h3><p>数据库实例</p></div></div>
                <div class="stat-card"><div class="stat-icon" style="background:#3B82F6;"><i class="fas fa-th"></i></div><div class="stat-info"><h3 id="stat-tables">0</h3><p>数据表</p></div></div>
                <div class="stat-card"><div class="stat-icon" style="background:#10B981;"><i class="fas fa-check-circle"></i></div><div class="stat-info"><h3 id="stat-online">0</h3><p>在线实例</p></div></div>
            </div>
            <div class="toolbar">
                <div class="toolbar-left">
                    <h3 style="font-size:15px;font-weight:600;">数据库实例</h3>
                    <div class="multi-filter" id="dbTypeFilterWrap">
                        <button type="button" class="multi-filter-trigger" id="dbTypeFilterTrigger" onclick="toggleDbTypeFilter(event)">
                            <span class="filter-label">数据库类型</span>
                            <span id="dbTypeFilterLabel">全部</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <div class="multi-filter-panel" id="dbTypeFilterPanel" style="display:none;">
                            <label class="multi-filter-item multi-filter-all">
                                <input type="checkbox" id="dbTypeSelectAll" checked onchange="onDbTypeSelectAll(this.checked)">
                                <span>全选</span>
                            </label>
                            <div class="multi-filter-divider"></div>
                            <div id="dbTypeFilterOptions"></div>
                        </div>
                    </div>
                    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="搜索实例..." oninput="filterInstances()" autocomplete="nope"></div>
                </div>
                <div class="toolbar-right" id="adminBtns"></div>
            </div>
            <div class="instances-grid" id="instancesGrid"></div>
        </div>
    </div>
</div>

<!-- Instance Modal -->
<div class="modal-overlay" id="instanceModal">
    <div class="modal">
        <div class="modal-header"><h3 id="instanceModalTitle">新增实例</h3><button class="modal-close" onclick="closeInstanceModal()">&times;</button></div>
        <div class="modal-body">
            <input type="hidden" id="inst-id">
            <div class="form-group">
                <label for="inst-dbtype">数据库类型 *</label>
                <select id="inst-dbtype" onchange="onInstDbTypeChange(true)">
                    <option value="MySQL">MySQL</option>
                    <option value="Oracle">Oracle</option>
                    <option value="PostgreSQL">PostgreSQL</option>
                </select>
                <p id="inst-type-hint" class="form-hint"></p>
            </div>
            <div class="form-group"><label>实例名称 *</label><input type="text" id="inst-name" placeholder="请输入实例名称" autocomplete="off" data-clear-on-open="1"></div>
            <div style="display:grid;grid-template-columns:2fr 1fr;gap:12px;">
                <div class="form-group"><label>主机地址 *</label><input type="text" id="inst-host" placeholder="如: localhost" autocomplete="off" data-clear-on-open="1"></div>
                <div class="form-group"><label>端口 *</label><input type="number" id="inst-port" value="3306" autocomplete="off"></div>
            </div>
            <div class="form-group"><label id="inst-dbname-label">数据库名 *</label><input type="text" id="inst-dbname" placeholder="请输入数据库名" autocomplete="off" data-clear-on-open="1"></div>
            <div class="form-group" id="inst-schema-group" style="display:none;">
                <label id="inst-schema-label">Schema</label>
                <input type="text" id="inst-schema" placeholder="请输入 Schema" autocomplete="off" data-clear-on-open="1">
            </div>
            <div class="form-group"><label>用户名 *</label><input type="text" id="inst-user" placeholder="请输入用户名" autocomplete="off" data-clear-on-open="1"></div>
            <div class="form-group"><label id="inst-pass-label">密码 *</label><input type="password" id="inst-pass" placeholder="请输入密码" autocomplete="new-password" data-clear-on-open="1"></div>
            <div class="form-group"><label>描述</label><textarea id="inst-desc" rows="2" placeholder="请输入描述"></textarea></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="testConnection()" style="margin-right:auto;"><i class="fas fa-plug"></i> 测试连接</button>
            <button class="btn btn-secondary" onclick="closeInstanceModal()">取消</button>
            <button class="btn btn-primary" onclick="handleSaveInstance()">保存</button>
        </div>
    </div>
</div>

<script src="../../js/config.js"></script>
<script src="js/db-types.js"></script>
<script>
function highlightNav(){var page=window.location.pathname.split('/').pop();document.querySelectorAll('.nav-item').forEach(function(item){var href=item.getAttribute('href');if(href&&href.split('/').pop()===page)item.classList.add('active');else item.classList.remove('active');});}
document.addEventListener('DOMContentLoaded', function(){ highlightNav(); });
</script>
<script src="js/main.js"></script>
</body>
</html>
