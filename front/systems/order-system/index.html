<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品列表 - 订单商城</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
    <div class="sidebar"></div>
    <div class="main-content">
        <div class="main-header">
            <h2>商品列表</h2>
            <div class="user-dropdown"><div class="user-dropdown-trigger"><div style="width:32px;height:32px;border-radius:50%;background:#F59E0B;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;"><i class="fas fa-user"></i></div><span class="user-name" style="font-size:14px;"></span></div>
                <div class="user-dropdown-menu"><a href="../../profile.html"><i class="fas fa-id-card"></i> 个人信息</a><a href="javascript:void(0)" onclick="showChangePwdModal()"><i class="fas fa-key"></i> 修改密码</a><div class="divider"></div><a href="javascript:void(0)" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> 退出登录</a></div>
            </div>
        </div>
        <div class="main-body">
            <div class="toolbar">
                <div class="toolbar-left">
                    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="搜索商品名称/描述..." oninput="applyProductFilter()" autocomplete="off"></div>
                    <select class="filter-select" id="categoryFilter" onchange="applyProductFilter()">
                        <option value="">全部分类</option>
                    </select>
                </div>
                <div class="toolbar-right">
                    <a href="cart.html" class="btn btn-primary"><i class="fas fa-shopping-cart"></i> 购物车</a>
                </div>
            </div>
            <div class="product-grid" id="productGrid"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
</div>
<script src="../../js/config.js"></script>
<script src="js/order-common.js"></script>
<script src="js/products.js"></script>
</body>
</html>
