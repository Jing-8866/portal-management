<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日志分析 - 系统门户管理平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
    <div class="sidebar">
        <div class="sidebar-header"><div class="logo"><i class="fas fa-chart-line"></i></div><h2>日志分析平台</h2></div>
        <nav class="sidebar-nav">
            <div class="nav-group-title">日志管理</div>
            <a class="nav-item active" href="index.html"><i class="fas fa-list-alt"></i> 日志查询</a>
        </nav>
        <div class="sidebar-footer"><a href="../../index.html"><i class="fas fa-arrow-left"></i> 返回门户首页</a></div>
    </div>
    <div class="main-content">
        <div class="main-header">
            <h2>日志分析</h2>
            <div class="user-dropdown"><div class="user-dropdown-trigger"><div style="width:32px;height:32px;border-radius:50%;background:#10B981;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;"><i class="fas fa-user"></i></div><span class="user-name" style="font-size:14px;"></span></div>
                <div class="user-dropdown-menu"><a href="../../profile.html"><i class="fas fa-id-card"></i> 个人信息</a><a href="javascript:void(0)" onclick="showChangePwdModal()"><i class="fas fa-key"></i> 修改密码</a><div class="divider"></div><a href="javascript:void(0)" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> 退出登录</a></div>
            </div>
        </div>
        <div class="main-body">
            <div class="stats-row">
                <div class="stat-card"><div class="stat-icon" style="background:#3B82F6;"><i class="fas fa-list"></i></div><div class="stat-info"><h3 id="stat-total">0</h3><p>日志总数</p></div></div>
                <div class="stat-card"><div class="stat-icon" style="background:#EF4444;"><i class="fas fa-exclamation-circle"></i></div><div class="stat-info"><h3 id="stat-error">0</h3><p>错误</p></div></div>
                <div class="stat-card"><div class="stat-icon" style="background:#F59E0B;"><i class="fas fa-exclamation-triangle"></i></div><div class="stat-info"><h3 id="stat-warn">0</h3><p>告警</p></div></div>
                <div class="stat-card"><div class="stat-icon" style="background:#6B7280;"><i class="fas fa-times-circle"></i></div><div class="stat-info"><h3 id="stat-fail">0</h3><p>失败</p></div></div>
            </div>
            <div class="toolbar">
                <div class="toolbar-left">
                    <select class="filter-select" id="levelFilter" onchange="applyFilter()"><option value="">全部级别</option><option value="INFO">INFO</option><option value="WARN">WARN</option><option value="ERROR">ERROR</option></select>
                    <select class="filter-select" id="sourceFilter" onchange="applyFilter()"><option value="">全部来源</option></select>
                    <div class="date-range">
                        <div class="date-input-wrap">
                            <i class="fas fa-calendar-alt"></i>
                            <input type="date" class="date-input" id="dateFrom" onchange="onDateRangeChange()">
                        </div>
                        <span class="date-separator">至</span>
                        <div class="date-input-wrap">
                            <i class="fas fa-calendar-alt"></i>
                            <input type="date" class="date-input" id="dateTo" onchange="onDateRangeChange()">
                        </div>
                    </div>
                    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="搜索操作/用户..." oninput="applyFilter()" autocomplete="nope"></div>
                </div>
            </div>
            <div class="table-container">
                <table><thead><tr><th>时间</th><th>级别</th><th>来源</th><th>用户名</th><th>操作</th><th>IP</th><th>状态</th><th>耗时(ms)</th><th>操作</th></tr></thead>
                <tbody id="logTableBody"></tbody></table>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>
</div>
<script src="../../js/config.js"></script>
<script src="js/main.js"></script>
</body>
</html>
