<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 系统门户管理平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-users-cog"></i></div>
            <h2>用户管理系统</h2>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-group-title">用户管理</div>
            <a class="nav-item" href="index.html" data-page="users"><i class="fas fa-users"></i> 用户管理</a>
            <a class="nav-item" href="users-no-perm.html" data-page="users-no-perm"><i class="fas fa-user-slash"></i> 查看无权限用户</a>
            <div class="nav-group-title">角色管理</div>
            <a class="nav-item" href="roles.html" data-page="roles"><i class="fas fa-user-shield"></i> 角色管理</a>
            <a class="nav-item" href="role-assign.html" data-page="role-assign"><i class="fas fa-user-plus"></i> 用户角色分配</a>
            <a class="nav-item" href="user-roles.html" data-page="user-roles"><i class="fas fa-search"></i> 查询用户角色</a>
            <div class="nav-group-title">权限管理</div>
            <a class="nav-item" href="perm-menu.html" data-page="perm-menu"><i class="fas fa-key"></i> 子系统权限分配</a>
            <a class="nav-item" href="perm-view.html" data-page="perm-view"><i class="fas fa-eye"></i> 系统权限查看</a>
            <a class="nav-item" href="perm-data.html" data-page="perm-data"><i class="fas fa-database"></i> 数据权限管理</a>
        </nav>
        <div class="sidebar-footer">
            <a href="../../index.html"><i class="fas fa-arrow-left"></i> 返回门户首页</a>
        </div>
    </div>
    <div class="main-content">
        <div class="main-header">
            <h2>用户管理</h2>
            <div class="user-dropdown">
                <div class="user-dropdown-trigger">
                    <div class="user-avatar" style="width:32px;height:32px;font-size:12px;background:#3B82F6;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;"><i class="fas fa-user"></i></div>
                    <span class="user-name" style="font-size:14px;"></span>
                </div>
                <div class="user-dropdown-menu">
                    <a href="../../profile.html"><i class="fas fa-id-card"></i> 个人信息</a>
                    <a href="javascript:void(0)" onclick="showChangePwdModal()"><i class="fas fa-key"></i> 修改密码</a>
                    <div class="divider"></div>
                    <a href="javascript:void(0)" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> 退出登录</a>
                </div>
            </div>
        </div>
        <div class="main-body">
            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-card"><div class="stat-icon" style="background:#3B82F6;"><i class="fas fa-users"></i></div><div class="stat-info"><h3 id="stat-total">0</h3><p>用户总数</p></div></div>
                <div class="stat-card"><div class="stat-icon" style="background:#10B981;"><i class="fas fa-user-check"></i></div><div class="stat-info"><h3 id="stat-active">0</h3><p>启用用户</p></div></div>
                <div class="stat-card"><div class="stat-icon" style="background:#EF4444;"><i class="fas fa-user-times"></i></div><div class="stat-info"><h3 id="stat-inactive">0</h3><p>停用用户</p></div></div>
            </div>

            <!-- Toolbar -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="搜索用户名/姓名..." oninput="applyFilter()" autocomplete="nope">
                    </div>
                    <select class="filter-select" id="statusFilter" onchange="applyFilter()">
                        <option value="">全部状态</option>
                        <option value="1">启用</option>
                        <option value="0">停用</option>
                    </select>
                </div>
                <div class="toolbar-right" id="adminBtns"></div>
            </div>

            <!-- Table -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th class="checkbox-cell"><input type="checkbox" id="checkAll" onchange="toggleCheckAll()"></th>
                            <th>序号</th><th>用户名</th><th>姓名</th><th>手机</th><th>邮箱</th><th>状态</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header"><h3 id="editModalTitle">编辑用户</h3><button class="modal-close" onclick="closeEditModal()">&times;</button></div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="form-group"><label>用户名 *</label><input type="text" id="edit-username" placeholder="请输入用户名" autocomplete="off" data-clear-on-open="1"></div>
                <div class="form-group"><label>姓名</label><input type="text" id="edit-realname" placeholder="请输入姓名" autocomplete="off" data-clear-on-open="1"></div>
                <div class="form-group"><label>邮箱</label><input type="email" id="edit-email" placeholder="请输入邮箱" autocomplete="off" data-clear-on-open="1"></div>
                <div class="form-group"><label>手机</label><input type="tel" id="edit-phone" placeholder="请输入手机号" autocomplete="off" data-clear-on-open="1"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
                <button class="btn btn-primary" onclick="handleSaveUser()">保存</button>
            </div>
        </div>
    </div>

    <!-- Password Modal -->
    <div class="modal-overlay" id="pwdModal">
        <div class="modal" style="width:400px;">
            <div class="modal-header"><h3>重置密码</h3><button class="modal-close" onclick="closePwdModal()">&times;</button></div>
            <div class="modal-body">
                <input type="hidden" id="pwd-user-id">
                <div class="form-group"><label>新密码</label><input type="password" id="new-pwd" placeholder="请输入新密码" autocomplete="new-password" data-clear-on-open="1"></div>
                <div class="form-group"><label>确认密码</label><input type="password" id="confirm-pwd" placeholder="请再次输入" autocomplete="new-password" data-clear-on-open="1"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closePwdModal()">取消</button>
                <button class="btn btn-primary" onclick="handleResetPwd()">确认</button>
            </div>
        </div>
    </div>

    <!-- Import Modal -->
    <div class="modal-overlay" id="importModal">
        <div class="modal" style="width:450px;">
            <div class="modal-header"><h3>批量导入用户</h3><button class="modal-close" onclick="closeImportModal()">&times;</button></div>
            <div class="modal-body">
                <p style="margin-bottom:12px;font-size:14px;color:#666;">请选择Excel文件(.xlsx)上传，<a href="javascript:void(0)" onclick="downloadTemplate()">下载模板</a></p>
                <input type="file" id="importFile" accept=".xlsx,.xls" style="margin-bottom:16px;">
                <div id="importResult" style="font-size:13px;color:#666;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeImportModal()">关闭</button>
                <button class="btn btn-primary" onclick="handleImport()">开始导入</button>
            </div>
        </div>
    </div>

    <script src="../../js/config.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
