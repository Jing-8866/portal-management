<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查看无权限用户 - 系统门户管理平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-users-cog"></i></div>
            <h2>用户管理系统</h2>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-group-title">用户管理</div>
            <a class="nav-item" href="index.html"><i class="fas fa-users"></i> 用户管理</a>
            <a class="nav-item" href="users-no-perm.html"><i class="fas fa-user-slash"></i> 查看无权限用户</a>
            <div class="nav-group-title">角色管理</div>
            <a class="nav-item" href="roles.html"><i class="fas fa-user-shield"></i> 角色管理</a>
            <a class="nav-item" href="role-assign.html"><i class="fas fa-user-plus"></i> 用户角色分配</a>
            <a class="nav-item" href="user-roles.html"><i class="fas fa-search"></i> 查询用户角色</a>
            <div class="nav-group-title">权限管理</div>
            <a class="nav-item" href="perm-menu.html"><i class="fas fa-key"></i> 子系统权限分配</a>
            <a class="nav-item" href="perm-view.html"><i class="fas fa-eye"></i> 系统权限查看</a>
            <a class="nav-item" href="perm-data.html"><i class="fas fa-database"></i> 数据权限管理</a>
        </nav>
        <div class="sidebar-footer">
            <a href="../../index.html"><i class="fas fa-arrow-left"></i> 返回门户首页</a>
        </div>
    </div>
    <div class="main-content">
        <div class="main-header">
            <h2>查看无权限用户</h2>
            <div class="user-dropdown">
                <div class="user-dropdown-trigger">
                    <div class="user-avatar" style="width:32px;height:32px;font-size:12px;background:#3B82F6;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;"><i class="fas fa-user"></i></div>
                    <span class="user-name" style="font-size:14px;"></span>
                </div>
                <div class="user-dropdown-menu">
                    <a href="../../profile.html"><i class="fas fa-id-card"></i> 个人信息</a>
                    <a href="javascript:void(0)" onclick="showChangePwdModal()"><i class="fas fa-key"></i> 修改密码</a>
                    <div class="divider"></div>
                    <a href="javascript:void(0)" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> 退出登录</a>
                </div>
            </div>
        </div>
        <div class="main-body">
            <div class="toolbar">
                <div class="toolbar-left">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="搜索用户名/姓名/邮箱/手机..." oninput="applyFilter()" autocomplete="nope">
                    </div>
                    <span class="filter-label" id="resultSummary">共 0 人无任何系统权限</span>
                </div>
                <div class="toolbar-right">
                    <button class="btn btn-secondary" onclick="loadUsers()"><i class="fas fa-sync-alt"></i> 刷新</button>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width:56px;">序号</th>
                            <th>用户名</th>
                            <th>姓名</th>
                            <th>邮箱</th>
                            <th>手机</th>
                            <th>状态</th>
                            <th>创建时间</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>
</div>
<script src="../../js/config.js"></script>
<script>
var allUsers = [], filteredUsers = [], userPage = 1, userPageSize = 10, searchTimer = null;

document.addEventListener('DOMContentLoaded', function() {
    if (!isLoggedIn()) { window.location.href = '../../login.html'; return; }
    initUserDropdown(); clearSearchInputs(); highlightNav(); loadUsers();
});

function highlightNav() {
    var page = window.location.pathname.split('/').pop();
    document.querySelectorAll('.nav-item').forEach(function(item) {
        var href = item.getAttribute('href');
        if (href && href.split('/').pop() === page) item.classList.add('active');
        else item.classList.remove('active');
    });
}

async function loadUsers() {
    try {
        var keyword = document.getElementById('searchInput').value.trim();
        var url = '/users/no-permissions';
        if (keyword) url += '?keyword=' + encodeURIComponent(keyword);
        allUsers = await request(url) || [];
        filteredUsers = allUsers.slice();
        userPage = 1;
        renderTable();
    } catch (e) {
        showToast('加载用户失败', 'error');
    }
}

function applyFilter() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadUsers, 300);
}

function renderTable() {
    document.getElementById('resultSummary').textContent = '共 ' + filteredUsers.length + ' 人无任何系统权限';
    var start = (userPage - 1) * userPageSize;
    var pageData = filteredUsers.slice(start, start + userPageSize);
    var tbody = document.getElementById('userTableBody');
    if (!pageData.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#999;">暂无无权限用户</td></tr>';
    } else {
        tbody.innerHTML = pageData.map(function(u, i) {
            var statusBadge = u.status === 1
                ? '<span class="status-badge status-active">启用</span>'
                : '<span class="status-badge status-inactive">停用</span>';
            return '<tr>' +
                '<td>' + (start + i + 1) + '</td>' +
                '<td>' + escapeHtml(u.username || '') + '</td>' +
                '<td>' + escapeHtml(u.realName || '-') + '</td>' +
                '<td>' + escapeHtml(u.email || '-') + '</td>' +
                '<td>' + escapeHtml(u.phone || '-') + '</td>' +
                '<td>' + statusBadge + '</td>' +
                '<td>' + formatTime(u.createdTime) + '</td>' +
                '</tr>';
        }).join('');
    }
    renderPagination();
}

function renderPagination() {
    var total = filteredUsers.length;
    var totalPages = Math.ceil(total / userPageSize) || 1;
    var html = '<div class="pagination-info">显示 ' + (total > 0 ? ((userPage - 1) * userPageSize + 1) : 0) + '-' +
        Math.min(userPage * userPageSize, total) + ' 条，共 ' + total + ' 条 | 每页 ' +
        '<select class="page-size-select" onchange="changePageSize(this.value)">' +
        [10, 20, 50].map(function(s) {
            return '<option value="' + s + '"' + (s === userPageSize ? ' selected' : '') + '>' + s + '</option>';
        }).join('') + '</select> 条</div>';
    html += '<div class="pagination-btns">';
    html += '<button ' + (userPage <= 1 ? 'disabled' : '') + ' onclick="goPage(' + (userPage - 1) + ')">‹</button>';
    for (var p = 1; p <= totalPages; p++) {
        if (totalPages > 7 && Math.abs(p - userPage) > 2 && p !== 1 && p !== totalPages) {
            if (p === 2 || p === totalPages - 1) html += '<button disabled>...</button>';
            continue;
        }
        html += '<button class="' + (p === userPage ? 'active' : '') + '" onclick="goPage(' + p + ')">' + p + '</button>';
    }
    html += '<button ' + (userPage >= totalPages ? 'disabled' : '') + ' onclick="goPage(' + (userPage + 1) + ')">›</button></div>';
    document.getElementById('pagination').innerHTML = html;
}

function goPage(p) { userPage = p; renderTable(); }
function changePageSize(val) { userPageSize = parseInt(val, 10); userPage = 1; renderTable(); }

function escapeHtml(str) {
    return String(str == null ? '' : str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
