<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统门户管理平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .portal-search { margin-bottom: 24px; text-align: center; }
        .portal-search input {
            width: 400px; padding: 12px 20px 12px 44px; border: 1px solid var(--border);
            border-radius: 24px; font-size: 15px; outline: none; transition: all 0.2s;
        }
        .portal-search input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(74,144,217,0.1); }
        .portal-search .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #999; }
        .systems-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; margin-top: 24px;
        }
        .system-card {
            background: var(--white); border-radius: var(--radius); padding: 24px;
            box-shadow: var(--shadow); cursor: pointer; transition: all 0.3s;
            position: relative; overflow: hidden;
        }
        .system-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .system-card.disabled { opacity: 0.5; cursor: not-allowed; }
        .system-card.disabled::after {
            content: '已停用'; position: absolute; top: 12px; right: -28px;
            background: #999; color: #fff; padding: 4px 32px; font-size: 12px;
            transform: rotate(45deg);
        }
        .system-card .card-icon {
            width: 56px; height: 56px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: #fff; margin-bottom: 16px;
        }
        .system-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        .system-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
        .system-card .card-actions {
            position: absolute; top: 12px; right: 12px;
            display: none; gap: 6px;
        }
        .system-card:hover .card-actions { display: flex; }
        .card-actions button {
            width: 28px; height: 28px; border-radius: 50%; border: none;
            cursor: pointer; font-size: 12px; display: flex; align-items: center;
            justify-content: center; transition: all 0.2s;
        }
        .card-actions .btn-edit { background: #e6f7ff; color: #1890ff; }
        .card-actions .btn-del { background: #fff2f0; color: #ff4d4f; }
        .card-actions .btn-toggle { background: #fff7e6; color: #faad14; }

        .add-card {
            border: 2px dashed var(--border); background: transparent;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 180px; cursor: pointer;
            transition: all 0.2s; box-shadow: none;
        }
        .add-card:hover { border-color: var(--primary); background: rgba(74,144,217,0.02); transform: none; }
        .add-card i { font-size: 32px; color: #ccc; margin-bottom: 8px; }
        .add-card span { font-size: 14px; color: #999; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo"><i class="fas fa-cubes"></i></div>
            <h1>系统门户管理平台</h1>
        </div>
        <div class="header-right">
            <div class="user-dropdown">
                <div class="user-dropdown-trigger">
                    <div class="user-avatar"><i class="fas fa-user"></i></div>
                    <span class="user-name"></span>
                </div>
                <div class="user-dropdown-menu">
                    <a href="profile.html"><i class="fas fa-id-card"></i> 个人信息</a>
                    <a href="javascript:void(0)" onclick="showChangePwdModal()"><i class="fas fa-key"></i> 修改密码</a>
                    <div class="divider"></div>
                    <a href="javascript:void(0)" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> 退出登录</a>
                </div>
            </div>
        </div>
    </header>

    <div class="content-wrapper">
        <div class="portal-search">
            <div style="position:relative;display:inline-block;">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="搜索子系统..." oninput="filterSystems()" autocomplete="nope">
            </div>
        </div>
        <div class="systems-grid" id="systemsGrid"></div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="systemModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">新增子系统</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="sys-id">
                <div class="form-group"><label>系统名称 *</label><input type="text" id="sys-name" placeholder="请输入系统名称" autocomplete="off" data-clear-on-open="1"></div>
                <div class="form-group"><label>系统编码 *</label><input type="text" id="sys-code" placeholder="请输入系统编码" autocomplete="off" data-clear-on-open="1"></div>
                <div class="form-group"><label>系统描述</label><textarea id="sys-desc" rows="3" placeholder="请输入描述" autocomplete="off"></textarea></div>
                <div class="form-group"><label>访问地址 *</label><input type="text" id="sys-url" placeholder="如: /systems/order-system/index.html" autocomplete="off" data-clear-on-open="1"></div>
                <div class="form-group"><label>图标 (FontAwesome)</label><input type="text" id="sys-icon" placeholder="如: fas fa-shopping-cart" autocomplete="off" data-clear-on-open="1"></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                    <div class="form-group"><label>主题色</label><input type="color" id="sys-color" value="#4A90D9"></div>
                    <div class="form-group"><label>排序</label><input type="number" id="sys-sort" value="0"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="handleSaveSubsystem()">保存</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
