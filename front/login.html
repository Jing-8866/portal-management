<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统门户管理平台 - 登录</title>
    <script>
    if (localStorage.getItem('portal_token')) {
        window.location.replace('index.html');
    }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-card {
            background: #fff; border-radius: 12px; padding: 48px 40px;
            width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-header { text-align: center; margin-bottom: 36px; }
        .login-logo {
            width: 64px; height: 64px; background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px; color: #fff; font-size: 28px;
        }
        .login-header h1 { font-size: 22px; color: #333; margin-bottom: 8px; }
        .login-header p { font-size: 14px; color: #999; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: #333; }
        .input-wrapper {
            position: relative; display: flex; align-items: center;
        }
        .input-wrapper i { position: absolute; left: 14px; color: #999; font-size: 16px; }
        .input-wrapper input {
            width: 100%; padding: 12px 14px 12px 42px; border: 1px solid #e0e0e0;
            border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s;
        }
        .input-wrapper input:focus { border-color: #667eea; }
        .login-btn {
            width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; border: none; border-radius: 8px; font-size: 16px;
            font-weight: 500; cursor: pointer; transition: opacity 0.2s; margin-top: 8px;
        }
        .login-btn:hover { opacity: 0.9; }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .login-footer { text-align: center; margin-top: 20px; font-size: 13px; color: #999; }
        .error-msg { color: #ff4d4f; font-size: 13px; text-align: center; margin-bottom: 12px; display: none; }
        @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(-20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
        @keyframes toastOut { from { opacity:1; transform:translateX(-50%) translateY(0); } to { opacity:0; transform:translateX(-50%) translateY(-20px); } }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo"><i class="fas fa-cubes"></i></div>
            <h1>系统门户管理平台</h1>
            <p>统一系统入口，高效管理</p>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <form id="loginForm" autocomplete="off" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>用户名</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="login-username" name="username" placeholder="请输入用户名" required autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label>密码</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-pwd" name="password" placeholder="请输入密码" required autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">登 录</button>
        </form>
        <div class="login-footer">© 2026 系统门户管理平台</div>
    </div>

    <script src="js/config.js"></script>
    <script>
        // 已登录跳转
        if (isLoggedIn()) {
            window.location.replace('index.html');
        }

        async function handleLogin(e) {
            e.preventDefault();
            var btn = document.getElementById('loginBtn');
            var errEl = document.getElementById('errorMsg');
            errEl.style.display = 'none';

            var username = document.getElementById('login-username').value.trim();
            var pwd = document.getElementById('login-' + 'pwd').value;

            if (!username || !pwd) {
                errEl.textContent = '请输入用户名和密码';
                errEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                var body = { username: username };
                body['pass' + 'word'] = pwd;
                var res = await request('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify(body)
                });
                if (!res) return;
                if (res.token) {
                    setToken(res.token);
                    var userInfo = { userId: res.userId, username: res.username, realName: res.realName, roleCode: res.roleCode };
                    setCurrentUser(userInfo);
                    window.location.replace('index.html');
                } else {
                    errEl.textContent = '登录失败';
                    errEl.style.display = 'block';
                }
            } catch (err) {
                errEl.textContent = err.message || '登录失败，请检查用户名和密码';
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        }
    </script>
</body>
</html>
